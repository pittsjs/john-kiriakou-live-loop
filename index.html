<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark">
    <title>Looping Stream Video</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <video
      autoplay
      muted
      loop
      playsinline
      preload="auto"
      aria-label="John Kiriakou live loop part 1"
    >
      <source src="john-kiriakou-live-loop-part-1.mp4" type="video/mp4">
    </video>
    <button class="start-button" type="button" hidden>Start Audio</button>
    <script src="player.js"></script>
  </body>
</html>
